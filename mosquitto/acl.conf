# Mosquitto ACL file (acl_file).
# Loaded by mosquitto.conf via `acl_file /mosquitto/config/acl.conf`.
#
# Two access models in play:
#   1. iot_gateway: a single shared user, read-only on the telemetry wildcard.
#   2. Vehicles: each vehicle authenticates as its own MQTT user (username ==
#      the vehicle's Postgres UUID), and may only publish to its own topic.
#      This is enforced via the `pattern` directive's %u substitution so a
#      compromised vehicle credential can't impersonate/publish as another
#      vehicle — no per-vehicle ACL lines need to be added/maintained by hand.

user iot_gateway
topic read vehicle/+/data

# NOTE: %u substitutes whichever user is connected, so this also grants
# iot_gateway write access to vehicle/iot_gateway/data. Accepted as low-risk:
# "iot_gateway" is not a valid vehicle UUID, and the gateway's own Zod
# validator (z.uuid() on vehicle_id) would reject that topic's messages
# before they could do anything. Revisit only if Mosquitto ACL deny-precedence
# is verified against a live broker — not attempting an untested fix here.
pattern write vehicle/%u/data
